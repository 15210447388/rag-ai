spring:
  application:
    name: rag-ai

  # ========== 数据库 ==========
  datasource:
    url: jdbc:postgresql://localhost:5432/ragkbai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none          # 生产用 validate，不自动改表结构
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ========== Redis ==========
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ========== 异步任务线程池 ==========
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: "index-task-"

  # ========== 文件上传限制 ==========
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # ========== Spring AI ==========
  ai:
    openai:
      # 使用 DashScope 的 OpenAI 兼容接口
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-ws-H.RYIMDPD.MBEz.MEQCIAbMaZeQeOnSfSU1G5gOs6iGvlvnrMyu-RkpJfZ1hWfBAiAlL-iV9VDnC1kEmDBik3RPtpC-zbX-UYI3aem5Z-l8QA   # 从环境变量读，不要硬编码
      chat:
        options:
          model: qwen-plus
          temperature: 0.1      # RAG 场景用低温，减少幻觉
          max-tokens: 2048
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: sk-ws-H.RYIMDPD.MBEz.MEQCIAbMaZeQeOnSfSU1G5gOs6iGvlvnrMyu-RkpJfZ1hWfBAiAlL-iV9VDnC1kEmDBik3RPtpC-zbX-UYI3aem5Z-l8QA   # 从环境变量读，不要硬编码
        options:
          model: text-embedding-v3
  cache:
    type: redis
    redis:
      time-to-live: 600000    # 10 分钟
      cache-null-values: false

# ========== MinIO ==========
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: rag-documents

# ========== Reranker ==========
reranker:
  endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
  api-key: sk-ws-H.RYIMDPD.MBEz.MEQCIAbMaZeQeOnSfSU1G5gOs6iGvlvnrMyu-RkpJfZ1hWfBAiAlL-iV9VDnC1kEmDBik3RPtpC-zbX-UYI3aem5Z-l8QA   # 从环境变量读，不要硬编码
  model: gte-rerank-v2
  timeout-ms: 800       # 超时时间，超过则降级
  top-n: 5              # 精排后保留 Top 5

# ========== RAG 参数 ==========
rag:
  chunk:
    size: 512           # 每块最大字符数
    overlap: 64         # 相邻块重叠字符数
  retrieval:
    vector-top-k: 20    # 向量检索召回数量
    fulltext-top-k: 20  # 全文检索召回数量
    return-top-n: 5     # RRF 融合后最终返回的 chunk 数量
    min-score: 0.5      # 最低相似度阈值（低于此分数的 chunk 过滤掉）
  context:
    max-tokens: 3000    # 传给模型的最大 context Token 数
  cache:
    embedding-ttl: 7d   # Embedding 缓存有效期
    query-ttl: 10m      # 查询结果缓存有效期

# ========== Sa-Token ==========
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400        # Token 有效期 1 天
  is-concurrent: true
  is-share: false
  is-read-header: true  # 从 Header 读取 token（curl / 前端 axios 都走 Header）

# ========== 监控 ==========
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ========== 日志 ==========
logging:
  level:
    com.jichi.ragkb: INFO
    org.springframework.ai: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"